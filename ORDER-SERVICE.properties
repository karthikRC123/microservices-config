message=order service
server.port=8081

spring.application.name=ORDER-SERVICE
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/orderdb}

eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

logging.level.com.tnf.order_service=DEBUG
logging.level.org.springframework.cloud.sleuth=DEBUG

management.endpoints.web.exposure.include=health,info,metrics,beans,httptrace,gateway,prometheus
management.endpoint.health.show-details=always
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=b3
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

info.app.name=Order Service
info.app.version=1.0.0
info.app.description=Manages Order catalog
springdoc.api-docs.path=/v3/api-docs